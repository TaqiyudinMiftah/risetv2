seed: 42

dataset:
  # Set this to your CAER-S directory with train/ and test/ subfolders.
  dataset_root: /home/agung/riset/risetv2/CAER-S

  # Supported image extensions.
  image_extensions: [".png", ".jpg", ".jpeg", ".bmp", ".webp"]

  # Optional stratified val split from train set.
  create_val_split: true
  val_ratio: 0.1

  # Deterministic image size for data pipeline and model input.
  image_size: 224

model:
  # Backbone for both face and context streams.
  backbone: resnet18
  # Use ImageNet pretrained weights (recommended for small datasets).
  pretrained: true
  # Dropout before final classifier.
  dropout: 0.5

train:
  batch_size: 32
  num_epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 4
  device: cuda
  # Stream mode: "multimodal" (both), "face" (ablation), "context" (ablation).
  stream_mode: multimodal
  save_dir: checkpoints/caers

outputs:
  manifest_path: artifacts/caers/manifest_caers.jsonl
  diagnostics_path: artifacts/caers/diagnostics_caers.json
